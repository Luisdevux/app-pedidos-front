version: '3.8'

services:
  app-pedidos-front:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_pedidos_front
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5020}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3001}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-sua_secret_aleatoria_aqui_pelo_menos_32_chars_h234j23h4k}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    restart: unless-stopped
    networks:
      - pedidos-network

networks:
  pedidos-network:
    external: true
