version: '3.8'

services:
  app-pedidos-front-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: app_pedidos_front_dev
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - PORT=3001
    env_file:
      - .env.local
    restart: unless-stopped
